<!DOCTYPE html>
<html lang="sk">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL 2025 - 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🔹 HLAVIČKA -->
<header class="main-header">
  <div class="header-left">
    <img src="./public/nhl_logo.png" alt="NHL Logo" class="nhl-logo">
    <div class="season-text">NHL 2025 – 2026</div>
  </div>
  <div class="header-center">
    <h1 class="header-title">Tipuj NHL ako profík!!</h1>
  </div>
</header>

<!-- 🔹 NAVIGÁCIA PRE PC -->
<nav class="desktop-nav">
  <ul>
    <li data-target="matches-section">Výsledky</li>
    <li data-target="teams-section">Rating tímov</li>
    <li data-target="players-section">Rating hráčov</li>
    <li data-target="mantingal-container">Mantingal</li>
    <li data-target="predictions-section">Predikcie</li>
  </ul>
</nav>
    
    <!-- 📱 mobilné menu -->
    <div class="mobile-menu">
        <select id="mobileSelect">
            <option value="matches">Výsledky</option>
            <option value="teams">Rating tímov</option>
            <option value="players">Rating hráčov</option>
            <option value="mantingal">Mantingal</option>
            <option value="predictions">Predikcie</option>
        </select>
    </div>

    <div class="container">
        <!-- 🏒 Zápasy -->
        <div class="left section" id="matches-section">
            <h2>Výsledky</h2>
            <table id="matches">
                <thead>
                    <tr>
                        <th>Domáci</th>
                        <th>Hostia</th>
                        <th>Skóre</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 📊 Rating tímov -->
        <div class="middle section" id="teams-section">
            <h2>Rating tímov</h2>
            <table id="teamRatings">
                <thead>
                    <tr>
                        <th>Tím</th>
                        <th>Rating</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 🧑‍🚀 Rating hráčov + Mantingal (PC) -->
        <div class="right section" id="players-section">
            <h2>Rating hráčov</h2>
            <table id="playerRatings">
                <thead>
                    <tr>
                        <th>Hráč</th>
                        <th>Rating</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <!-- Mantingal sa vloží pod rating hráčov v PC -->
            <div id="mantingal-container-pc"></div>
        </div>

        <!-- 💰 Mantingal (mobilná verzia) -->
        <div class="mantingal-mobile section" id="mantingal-container"></div>
    </div>

        <!-- predikcie (mobilná verzia) -->
        <div class="section" id="predictions-section">
            <h2>Predikcie</h2>
            <p>Táto sekcia bude čoskoro dostupná...</p>
        </div>

    <script src="app.js"></script>
    <script>
        // 📱 prepínanie sekcií na mobile
        document.getElementById("mobileSelect").addEventListener("change", (e) => {
            const val = e.target.value;
            document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");

            if (val === "matches") document.getElementById("matches-section").style.display = "block";
            if (val === "teams") document.getElementById("teams-section").style.display = "block";
            if (val === "players") document.getElementById("players-section").style.display = "block";
            if (val === "mantingal") document.getElementById("mantingal-container").style.display = "block";
            if (val === "predictions") document.getElementById("predictions-section").style.display = "block";
        });

        // default – pri štarte na mobile zobraz zápasy
        document.addEventListener("DOMContentLoaded", () => {
            if (window.innerWidth <= 768) {
                document.getElementById("matches-section").style.display = "block";
            }
        });
    </script>

    <script>
  // 🖥️ Klikateľné menu na PC
  document.querySelectorAll(".desktop-nav li").forEach((item) => {
    item.addEventListener("click", () => {
      const target = item.getAttribute("data-target");
      document.querySelectorAll(".section").forEach(sec => sec.style.display = "none");
      document.getElementById(target).style.display = "block";
    });
  });
</script>
</body>
</html>
